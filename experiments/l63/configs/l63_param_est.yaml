# L63 parameter estimation with differentiable EnKF — aligned with enkf_butterfly for comparison
# Same seed, N_ens, true params, data_path, obs_std, and dt so results are comparable with
# the standard (state-augmented) EnKF in Experiments/obs_dt_sweep.

# Randomness (match enkf_butterfly)
seed: 42

# Ensemble size (match enkf_butterfly)
N_ens: 50

# Problem
x_dim: 3
p_dim: 3
m: 3

# True L63 parameters (sigma, rho, beta) — same order as EnKF_PPE Lorentz63
true_params:
  sigma: 10.0
  rho: 28.0
  beta: 8/3

# Initial parameter guess for learning (sigma, rho, beta) — deliberately off true
init_params:
  sigma: 12.0
  rho: 20.0
  beta: 5.0

# Model integration (match enkf_butterfly time_step)
dt: 0.01

# Data: same file as enkf_butterfly so we use the same truth trajectory
# Set to null to generate in-memory with true_params + warmup instead
data_path: Lorentz63/sigma10.0000_rho28.0000_beta2.6667_dt0.0100.pt

# Observation setup
# n_forecasts: model steps between observations → obs_dt = n_forecasts * dt
n_forecasts: 5
n_obs: 200
obs_std: 1.0

# Process noise (Q) — separate from observation noise; match EnKF process_noise_cov.std for comparison
# Used as initial per-dimension std for the learned model Q (diagonal covariance).
process_std: 0.5

# Initial state ensemble (match enkf_butterfly state_init spread)
state_init_std: 0.5
init_cov_diag: [25.0, 25.0, 50.0] # var = 0.25 per dimension in EnKF (potentially change)

# Legacy: initial Q scale if process_std not set (default 0.05)
init_Q_diag_scale: 0.05

# Training
epochs: 100
chunk_length: 20
lr: 0.1
# Match the original Lorenz-96 script:
# lambda epoch: (epoch-9)**(-0.5) if epoch >= 10 else 1
lr_lambda_epoch_start: 30
lr_lambda_exponent: -0.4

# ODE solver
ode_method: rk4
ode_step_size: 0.01
adjoint_method: rk4
adjoint_step_size: 0.05

# Output
save_plot: true
plot_path: l63_parameter_estimation.png
filter_mode: em

hydra:
  job:
    chdir: false
  run:
    dir: ???
