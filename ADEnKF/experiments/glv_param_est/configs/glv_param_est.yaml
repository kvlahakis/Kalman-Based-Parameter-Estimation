seed: 42

# Ensemble size
N_ens: 50

# Problem dimensions
x_dim: 5     # number of species
p_dim: 18    # length of theta (r_i and non-zero A_ij entries)

# Data files (relative to Data/)
# Default: well-specified baseline a_hidden = 0.00
data_truth_path: gLV/data/glv_ahidden0p00_truth.npz
data_obs_path:   gLV/data/glv_ahidden0p00_obs.npz

# Observation setup (analogue of L63 config)
# n_obs: max number of observation times to use from the gLV dataset
n_obs: 200

# Initial parameter guess: scaled version of truth (do not use 0: zero params → degenerate dynamics and NaN)
init_theta_scale: 0.5

# Process noise (Q): initial per-dimension std for learned model noise
process_std: 0.01
init_Q_diag_scale: 0.05

# Initial state ensemble covariance (diagonal entries)
init_cov_diag: [0.25 , 0.25, 0.25, 0.25, 0.25]

# Training
epochs: 100
chunk_length: 20
lr: 0.05
# Gradient clipping to avoid NaN from exploding gradients (set to null to disable)
clip_grad_norm: 1.0
lr_lambda_epoch_start: 40
lr_lambda_exponent: -0.5
filter_mode: ad

# ODE solver
dt: 0.5          # fallback if t-grid has only one point (normally unused)
ode_method: rk4
ode_step_size: 0.1
adjoint_method: rk4
adjoint_step_size: 0.1

# Output
save_plot: true
plot_path: glv_parameter_estimation.png

hydra:
  job:
    chdir: false
  run:
    dir: ???

